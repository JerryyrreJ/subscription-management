openapi: 3.1.0
info:
  title: Subscription Manager Public API
  version: 1.0.0
  description: Public API for subscription CRUD automation through Developer API keys.
servers:
  - url: https://your-site.example
    description: Replace with your deployed Subscription Manager site URL.
security:
  - bearerApiKey: []
tags:
  - name: Subscriptions
    description: Create, read, update, and delete subscriptions for the API key owner.
paths:
  /api/v1/subscriptions:
    get:
      tags:
        - Subscriptions
      summary: List subscriptions
      description: Returns subscriptions owned by the authenticated API key owner.
      operationId: listSubscriptions
      x-mint:
        href: /api-reference/subscriptions/list
      responses:
        "200":
          description: Subscriptions returned.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionListResponse"
              examples:
                subscriptions:
                  value:
                    data:
                      - id: "33333333-3333-4333-8333-333333333333"
                        name: Netflix
                        category: Streaming
                        amount: 15.99
                        currency: USD
                        period: monthly
                        lastPaymentDate: "2026-06-01"
                        nextPaymentDate: "2026-07-01"
                        notificationEnabled: true
                        createdAt: "2026-06-16T00:00:00.000Z"
                        updatedAt: "2026-06-16T00:00:00.000Z"
                    requestId: request-1
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Subscriptions
      summary: Create a subscription
      description: Creates a subscription for the authenticated API key owner. Server-managed fields are rejected if supplied.
      operationId: createSubscription
      x-mint:
        href: /api-reference/subscriptions/create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionWrite"
            examples:
              monthly:
                value:
                  name: Netflix
                  category: Streaming
                  amount: 15.99
                  currency: USD
                  period: monthly
                  lastPaymentDate: "2026-06-01"
                  notificationEnabled: true
              custom:
                value:
                  name: Domain renewal
                  category: Infrastructure
                  amount: 12
                  currency: USD
                  period: custom
                  lastPaymentDate: "2026-06-01"
                  customDate: "45"
                  notificationEnabled: true
      responses:
        "201":
          description: Subscription created.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    options:
      tags:
        - Subscriptions
      summary: Preflight subscriptions collection
      description: Returns CORS headers for browser preflight requests.
      operationId: optionsSubscriptions
      security: []
      x-mint:
        href: /api-reference/subscriptions/options
      responses:
        "204":
          description: Preflight accepted.
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
                example: "*"
            Access-Control-Allow-Headers:
              schema:
                type: string
                example: Authorization, Content-Type
            Access-Control-Allow-Methods:
              schema:
                type: string
                example: GET, POST, PATCH, DELETE, OPTIONS
  /api/v1/subscriptions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Subscription UUID.
        schema:
          type: string
          format: uuid
        example: "33333333-3333-4333-8333-333333333333"
    get:
      tags:
        - Subscriptions
      summary: Get a subscription
      description: Returns one subscription if it belongs to the authenticated API key owner.
      operationId: getSubscription
      x-mint:
        href: /api-reference/subscriptions/get
      responses:
        "200":
          description: Subscription returned.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags:
        - Subscriptions
      summary: Update a subscription
      description: Updates a non-empty subset of writable fields. The server validates the merged result and recalculates nextPaymentDate.
      operationId: updateSubscription
      x-mint:
        href: /api-reference/subscriptions/update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionPatch"
            examples:
              changePeriod:
                value:
                  period: yearly
              disableNotifications:
                value:
                  notificationEnabled: false
      responses:
        "200":
          description: Subscription updated.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags:
        - Subscriptions
      summary: Delete a subscription
      description: Deletes one subscription if it belongs to the authenticated API key owner.
      operationId: deleteSubscription
      x-mint:
        href: /api-reference/subscriptions/delete
      responses:
        "200":
          description: Subscription deleted.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                type: object
                required:
                  - deleted
                  - requestId
                properties:
                  deleted:
                    type: boolean
                    const: true
                  requestId:
                    type: string
                additionalProperties: false
              examples:
                deleted:
                  value:
                    deleted: true
                    requestId: request-1
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    options:
      tags:
        - Subscriptions
      summary: Preflight subscription item
      description: Returns CORS headers for browser preflight requests.
      operationId: optionsSubscription
      security: []
      x-mint:
        href: /api-reference/subscriptions/options-item
      responses:
        "204":
          description: Preflight accepted.
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
                example: "*"
            Access-Control-Allow-Headers:
              schema:
                type: string
                example: Authorization, Content-Type
            Access-Control-Allow-Methods:
              schema:
                type: string
                example: GET, POST, PATCH, DELETE, OPTIONS
components:
  securitySchemes:
    bearerApiKey:
      type: http
      scheme: bearer
      description: Developer API key generated in the app.
      x-default: subm_your_key_here
  headers:
    XRateLimitLimit:
      description: Total allowed requests in the current fixed window.
      schema:
        type: integer
        example: 60
    XRateLimitRemaining:
      description: Requests remaining in the current fixed window.
      schema:
        type: integer
        example: 59
    XRateLimitReset:
      description: Unix timestamp in seconds when the fixed window resets.
      schema:
        type: integer
        example: 1781690400
  responses:
    BadRequest:
      description: The request payload or path parameter is invalid.
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidField:
              value:
                error:
                  code: invalid_subscription_field
                  message: "Field is not writable: nextPaymentDate"
                requestId: request-1
    Unauthorized:
      description: The API key is missing, invalid, or revoked.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidApiKey:
              value:
                error:
                  code: invalid_api_key
                  message: Invalid API key
                requestId: request-1
    NotFound:
      description: The subscription was not found for the API key owner.
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missing:
              value:
                error:
                  code: subscription_not_found
                  message: Subscription not found
                requestId: request-1
    RateLimited:
      description: The user request limit or invalid-auth attempt limit was exceeded.
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            rateLimited:
              value:
                error:
                  code: rate_limit_exceeded
                  message: Rate limit exceeded
                requestId: request-1
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            internal:
              value:
                error:
                  code: internal_error
                  message: Internal server error
                requestId: request-1
  schemas:
    SubscriptionPeriod:
      type: string
      enum:
        - monthly
        - yearly
        - custom
    Currency:
      type: string
      enum:
        - CNY
        - USD
        - EUR
        - JPY
        - GBP
        - AUD
        - CAD
        - CHF
        - HKD
        - SGD
    DateOnly:
      type: string
      pattern: "^\\d{4}-\\d{2}-\\d{2}$"
      example: "2026-06-01"
    Subscription:
      type: object
      required:
        - id
        - name
        - category
        - amount
        - currency
        - period
        - lastPaymentDate
        - nextPaymentDate
        - notificationEnabled
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 120
        category:
          type: string
          minLength: 1
          maxLength: 80
        amount:
          type: number
          minimum: 0
          maximum: 999999.99
          multipleOf: 0.01
        currency:
          $ref: "#/components/schemas/Currency"
        period:
          $ref: "#/components/schemas/SubscriptionPeriod"
        lastPaymentDate:
          $ref: "#/components/schemas/DateOnly"
        nextPaymentDate:
          $ref: "#/components/schemas/DateOnly"
        customDate:
          type: string
          pattern: "^[1-9]\\d*$"
          description: Required only when period is custom.
        notificationEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: false
    SubscriptionWrite:
      type: object
      required:
        - name
        - category
        - amount
        - currency
        - period
        - lastPaymentDate
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        category:
          type: string
          minLength: 1
          maxLength: 80
        amount:
          type: number
          minimum: 0
          maximum: 999999.99
          multipleOf: 0.01
        currency:
          $ref: "#/components/schemas/Currency"
        period:
          $ref: "#/components/schemas/SubscriptionPeriod"
        lastPaymentDate:
          $ref: "#/components/schemas/DateOnly"
        customDate:
          type: string
          pattern: "^[1-9]\\d*$"
          description: Required only when period is custom.
        notificationEnabled:
          type: boolean
          default: true
      additionalProperties: false
    SubscriptionPatch:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        category:
          type: string
          minLength: 1
          maxLength: 80
        amount:
          type: number
          minimum: 0
          maximum: 999999.99
          multipleOf: 0.01
        currency:
          $ref: "#/components/schemas/Currency"
        period:
          $ref: "#/components/schemas/SubscriptionPeriod"
        lastPaymentDate:
          $ref: "#/components/schemas/DateOnly"
        customDate:
          type: string
          pattern: "^[1-9]\\d*$"
        notificationEnabled:
          type: boolean
      additionalProperties: false
    SubscriptionResponse:
      type: object
      required:
        - data
        - requestId
      properties:
        data:
          $ref: "#/components/schemas/Subscription"
        requestId:
          type: string
      additionalProperties: false
    SubscriptionListResponse:
      type: object
      required:
        - data
        - requestId
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Subscription"
        requestId:
          type: string
      additionalProperties: false
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
      additionalProperties: false
    ErrorResponse:
      type: object
      required:
        - error
        - requestId
      properties:
        error:
          $ref: "#/components/schemas/Error"
        requestId:
          type: string
      additionalProperties: false
