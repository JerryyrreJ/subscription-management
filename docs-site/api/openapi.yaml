openapi: 3.1.0
info:
  title: Subscription Manager Public API
  version: 1.0.0
  description: Public API for subscription CRUD automation through Developer API keys. The operation descriptions include AI-oriented task semantics, risk levels, and confirmation guidance for agent integrations.
servers:
  - url: https://your-site.example
    description: Replace with your deployed Subscription Manager site URL.
security:
  - bearerApiKey: []
tags:
  - name: Subscriptions
    description: Create, read, update, and delete subscriptions for the API key owner.
    x-ai:
      domain: subscription_management
      ownerScope: authenticated_api_key_owner
      writeSafety: Confirm create, update, and delete operations with the user before calling them from an AI agent.
paths:
  /api/v1/subscriptions:
    get:
      tags:
        - Subscriptions
      summary: List subscriptions
      description: Returns subscriptions owned by the authenticated API key owner.
      operationId: listSubscriptions
      x-ai:
        purpose: Find and inspect the authenticated user's subscriptions before planning analysis, update, or delete tasks.
        naturalLanguageTriggers:
          - Show my subscriptions.
          - Which subscriptions are renewing soon?
          - Find the Netflix subscription before I change it.
        riskLevel: low
        requiresConfirmation: false
        useWhen: The user wants to view, search, summarize, compare, or identify subscriptions.
        doNotUseWhen: The user provides a specific subscription UUID and wants only that record; use getSubscription instead.
      x-mint:
        href: /api-reference/subscriptions/list
      responses:
        "200":
          description: Subscriptions returned.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionListResponse"
              examples:
                subscriptions:
                  value:
                    data:
                      - id: "33333333-3333-4333-8333-333333333333"
                        name: Netflix
                        category: Streaming
                        amount: 15.99
                        currency: USD
                        period: monthly
                        lastPaymentDate: "2026-06-01"
                        nextPaymentDate: "2026-07-01"
                        notificationEnabled: true
                        createdAt: "2026-06-16T00:00:00.000Z"
                        updatedAt: "2026-06-16T00:00:00.000Z"
                    requestId: request-1
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Subscriptions
      summary: Create a subscription
      description: Creates a subscription for the authenticated API key owner. Server-managed fields are rejected if supplied.
      operationId: createSubscription
      x-ai:
        purpose: Record a new subscription that the user currently uses or wants to track.
        naturalLanguageTriggers:
          - Add ChatGPT Plus, 20 USD monthly, last paid today.
          - Record a yearly GitHub subscription.
          - I just subscribed to Netflix, track it for me.
        riskLevel: medium
        requiresConfirmation: true
        useWhen: The user asks to add or record a subscription that does not already exist.
        doNotUseWhen: The user is changing an existing subscription; identify the existing record and use updateSubscription.
      x-mint:
        href: /api-reference/subscriptions/create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionWrite"
            examples:
              monthly:
                value:
                  name: Netflix
                  category: Streaming
                  amount: 15.99
                  currency: USD
                  period: monthly
                  lastPaymentDate: "2026-06-01"
                  notificationEnabled: true
              custom:
                value:
                  name: Domain renewal
                  category: Infrastructure
                  amount: 12
                  currency: USD
                  period: custom
                  lastPaymentDate: "2026-06-01"
                  customDate: "45"
                  notificationEnabled: true
      responses:
        "201":
          description: Subscription created.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    options:
      tags:
        - Subscriptions
      summary: Preflight subscriptions collection
      description: Returns CORS headers for browser preflight requests.
      operationId: optionsSubscriptions
      security: []
      x-mint:
        href: /api-reference/subscriptions/options
      responses:
        "204":
          description: Preflight accepted.
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
                example: "*"
            Access-Control-Allow-Headers:
              schema:
                type: string
                example: Authorization, Content-Type
            Access-Control-Allow-Methods:
              schema:
                type: string
                example: GET, POST, PATCH, DELETE, OPTIONS
  /api/v1/subscriptions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Subscription UUID.
        schema:
          type: string
          format: uuid
        example: "33333333-3333-4333-8333-333333333333"
    get:
      tags:
        - Subscriptions
      summary: Get a subscription
      description: Returns one subscription if it belongs to the authenticated API key owner.
      operationId: getSubscription
      x-ai:
        purpose: Retrieve one known subscription by UUID after it has already been identified.
        naturalLanguageTriggers:
          - Show details for this subscription id.
          - Verify the record before updating it.
        riskLevel: low
        requiresConfirmation: false
        useWhen: A subscription UUID is already available and the agent needs exact current state.
        doNotUseWhen: The user only provides a name such as Netflix; use listSubscriptions and match by name/category first.
      x-mint:
        href: /api-reference/subscriptions/get
      responses:
        "200":
          description: Subscription returned.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags:
        - Subscriptions
      summary: Update a subscription
      description: Updates a non-empty subset of writable fields. The server validates the merged result and recalculates nextPaymentDate.
      operationId: updateSubscription
      x-ai:
        purpose: Change writable fields on an existing subscription, such as amount, category, period, last payment date, custom interval, or notifications.
        naturalLanguageTriggers:
          - Change Netflix to yearly billing.
          - Update ChatGPT Plus to 20 USD.
          - Turn off renewal reminders for this subscription.
        riskLevel: medium
        requiresConfirmation: true
        useWhen: The target subscription has been identified and the user wants to modify tracked details.
        doNotUseWhen: The user wants to remove the subscription completely; use deleteSubscription after explicit confirmation.
      x-mint:
        href: /api-reference/subscriptions/update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionPatch"
            examples:
              changePeriod:
                value:
                  period: yearly
              disableNotifications:
                value:
                  notificationEnabled: false
      responses:
        "200":
          description: Subscription updated.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags:
        - Subscriptions
      summary: Delete a subscription
      description: Deletes one subscription if it belongs to the authenticated API key owner.
      operationId: deleteSubscription
      x-ai:
        purpose: Permanently remove a subscription record from tracking.
        naturalLanguageTriggers:
          - Delete the Netflix subscription.
          - Remove this duplicate subscription record.
        riskLevel: high
        requiresConfirmation: true
        useWhen: The user clearly wants the tracked record removed and has confirmed the exact subscription.
        doNotUseWhen: The user wants to mark a subscription inactive; the current API has no inactive status field.
      x-mint:
        href: /api-reference/subscriptions/delete
      responses:
        "200":
          description: Subscription deleted.
          headers:
            X-RateLimit-Limit:
              $ref: "#/components/headers/XRateLimitLimit"
            X-RateLimit-Remaining:
              $ref: "#/components/headers/XRateLimitRemaining"
            X-RateLimit-Reset:
              $ref: "#/components/headers/XRateLimitReset"
          content:
            application/json:
              schema:
                type: object
                required:
                  - deleted
                  - requestId
                properties:
                  deleted:
                    type: boolean
                    const: true
                  requestId:
                    type: string
                additionalProperties: false
              examples:
                deleted:
                  value:
                    deleted: true
                    requestId: request-1
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    options:
      tags:
        - Subscriptions
      summary: Preflight subscription item
      description: Returns CORS headers for browser preflight requests.
      operationId: optionsSubscription
      security: []
      x-mint:
        href: /api-reference/subscriptions/options-item
      responses:
        "204":
          description: Preflight accepted.
          headers:
            Access-Control-Allow-Origin:
              schema:
                type: string
                example: "*"
            Access-Control-Allow-Headers:
              schema:
                type: string
                example: Authorization, Content-Type
            Access-Control-Allow-Methods:
              schema:
                type: string
                example: GET, POST, PATCH, DELETE, OPTIONS
components:
  securitySchemes:
    bearerApiKey:
      type: http
      scheme: bearer
      description: Developer API key generated in the app.
      x-default: subm_your_key_here
  headers:
    XRateLimitLimit:
      description: Total allowed requests in the current fixed window.
      schema:
        type: integer
        example: 60
    XRateLimitRemaining:
      description: Requests remaining in the current fixed window.
      schema:
        type: integer
        example: 59
    XRateLimitReset:
      description: Unix timestamp in seconds when the fixed window resets.
      schema:
        type: integer
        example: 1781690400
  responses:
    BadRequest:
      description: The request payload or path parameter is invalid.
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidField:
              value:
                error:
                  code: invalid_subscription_field
                  message: "Field is not writable: nextPaymentDate"
                  field: nextPaymentDate
                  suggestedFix: Remove server-managed fields such as id, nextPaymentDate, createdAt, and updatedAt before retrying.
                  writableFields:
                    - amount
                    - category
                    - currency
                    - customDate
                    - lastPaymentDate
                    - name
                    - notificationEnabled
                    - period
                requestId: request-1
            invalidPeriod:
              value:
                error:
                  code: invalid_subscription
                  message: Invalid option
                  field: period
                  suggestedFix: "Use one of the supported billing periods: monthly, yearly, custom."
                  allowedValues:
                    - monthly
                    - yearly
                    - custom
                requestId: request-1
    Unauthorized:
      description: The API key is missing, invalid, or revoked.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidApiKey:
              value:
                error:
                  code: invalid_api_key
                  message: Invalid API key
                requestId: request-1
    NotFound:
      description: The subscription was not found for the API key owner.
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missing:
              value:
                error:
                  code: subscription_not_found
                  message: Subscription not found
                requestId: request-1
    RateLimited:
      description: The user request limit or invalid-auth attempt limit was exceeded.
      headers:
        X-RateLimit-Limit:
          $ref: "#/components/headers/XRateLimitLimit"
        X-RateLimit-Remaining:
          $ref: "#/components/headers/XRateLimitRemaining"
        X-RateLimit-Reset:
          $ref: "#/components/headers/XRateLimitReset"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            rateLimited:
              value:
                error:
                  code: rate_limit_exceeded
                  message: Rate limit exceeded
                requestId: request-1
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            internal:
              value:
                error:
                  code: internal_error
                  message: Internal server error
                requestId: request-1
  schemas:
    SubscriptionPeriod:
      type: string
      description: Billing cadence used to calculate nextPaymentDate.
      enum:
        - monthly
        - yearly
        - custom
    Currency:
      type: string
      description: ISO-like currency code supported by the app.
      enum:
        - CNY
        - USD
        - EUR
        - JPY
        - GBP
        - AUD
        - CAD
        - CHF
        - HKD
        - SGD
    DateOnly:
      type: string
      description: Calendar date without time, always in YYYY-MM-DD format.
      pattern: "^\\d{4}-\\d{2}-\\d{2}$"
      example: "2026-06-01"
    Subscription:
      type: object
      required:
        - id
        - name
        - category
        - amount
        - currency
        - period
        - lastPaymentDate
        - nextPaymentDate
        - notificationEnabled
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
          description: Server-generated subscription identifier.
        name:
          type: string
          description: Human-readable service or product name.
          minLength: 1
          maxLength: 120
        category:
          type: string
          description: User-visible category label used for grouping and analytics.
          minLength: 1
          maxLength: 80
        amount:
          type: number
          description: Payment amount in major currency units, with at most 2 decimal places.
          minimum: 0
          maximum: 999999.99
          multipleOf: 0.01
        currency:
          $ref: "#/components/schemas/Currency"
        period:
          $ref: "#/components/schemas/SubscriptionPeriod"
        lastPaymentDate:
          $ref: "#/components/schemas/DateOnly"
        nextPaymentDate:
          description: Server-calculated next payment date.
          $ref: "#/components/schemas/DateOnly"
        customDate:
          type: string
          pattern: "^[1-9]\\d*$"
          description: Required only when period is custom. Despite the legacy name, this is a positive whole-number string of days, not a calendar date.
        notificationEnabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      additionalProperties: false
    SubscriptionWrite:
      type: object
      required:
        - name
        - category
        - amount
        - currency
        - period
        - lastPaymentDate
      properties:
        name:
          type: string
          description: Human-readable service or product name.
          minLength: 1
          maxLength: 120
        category:
          type: string
          description: User-visible category label used for grouping and analytics.
          minLength: 1
          maxLength: 80
        amount:
          type: number
          description: Payment amount in major currency units, with at most 2 decimal places.
          minimum: 0
          maximum: 999999.99
          multipleOf: 0.01
        currency:
          $ref: "#/components/schemas/Currency"
        period:
          $ref: "#/components/schemas/SubscriptionPeriod"
        lastPaymentDate:
          description: Most recent payment date. The server calculates nextPaymentDate from this value and period.
          $ref: "#/components/schemas/DateOnly"
        customDate:
          type: string
          pattern: "^[1-9]\\d*$"
          description: Required only when period is custom. Despite the legacy name, this is a positive whole-number string of days, not a calendar date.
        notificationEnabled:
          type: boolean
          default: true
      additionalProperties: false
    SubscriptionPatch:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        category:
          type: string
          minLength: 1
          maxLength: 80
        amount:
          type: number
          minimum: 0
          maximum: 999999.99
          multipleOf: 0.01
        currency:
          $ref: "#/components/schemas/Currency"
        period:
          $ref: "#/components/schemas/SubscriptionPeriod"
        lastPaymentDate:
          $ref: "#/components/schemas/DateOnly"
        customDate:
          type: string
          pattern: "^[1-9]\\d*$"
          description: Required only when period is custom. Despite the legacy name, this is a positive whole-number string of days, not a calendar date.
        notificationEnabled:
          type: boolean
      additionalProperties: false
    SubscriptionResponse:
      type: object
      required:
        - data
        - requestId
      properties:
        data:
          $ref: "#/components/schemas/Subscription"
        requestId:
          type: string
      additionalProperties: false
    SubscriptionListResponse:
      type: object
      required:
        - data
        - requestId
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Subscription"
        requestId:
          type: string
      additionalProperties: false
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
        field:
          type: string
          description: Field that caused the error when the server can identify one.
        suggestedFix:
          type: string
          description: Human- and AI-readable correction hint.
        allowedValues:
          type: array
          items:
            type: string
          description: Allowed enum values when the error is caused by an unsupported enum.
        writableFields:
          type: array
          items:
            type: string
          description: Writable subscription fields when the error is caused by a non-writable field.
      additionalProperties: false
    ErrorResponse:
      type: object
      required:
        - error
        - requestId
      properties:
        error:
          $ref: "#/components/schemas/Error"
        requestId:
          type: string
      additionalProperties: false
