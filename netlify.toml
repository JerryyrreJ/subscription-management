# Netlify Configuration File
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Build command
  command = "npm run build"

  # Directory with the build output
  publish = "dist"

  # Directory with the serverless functions
  functions = "netlify/functions"

[build.environment]
  # Node version
  NODE_VERSION = "18"

# Redirect rules for SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Specific headers for Stripe webhook endpoint
[[headers]]
  for = "/.netlify/functions/stripe-webhook"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "stripe-signature"
    Access-Control-Allow-Methods = "POST"

# Prerender Extension Configuration (optional)
# The Prerender extension works automatically, but you can customize if needed
# [[plugins]]
#   package = "@netlify/plugin-prerender"
#   [plugins.inputs]
#     # Specific routes to prerender (if you want to limit)
#     # routes = ["/", "/pricing", "/about"]
#     # User agents to trigger prerendering for (defaults include common crawlers)
#     # userAgents = ["googlebot", "bingbot", "twitterbot"]

# Scheduled Functions Configuration
# For scheduled functions, the schedule is defined in the function file itself
# using the `config` export (Netlify Functions v2). No additional netlify.toml config needed.
# See: netlify/functions/send-scheduled-notifications.ts
